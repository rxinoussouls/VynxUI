name: Release

on:
    push:
        tags:
            - "*"

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm install

            - name: Setup Aftman
              uses: ok-nick/setup-aftman@v0.3.0
              continue-on-error: true

            - name: Install Aftman tools
              run: aftman install || true

            - name: Build
              run: npm run build

            - name: Get version from tag
              id: version
              run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

            - name: Get changelog
              id: changelog
              run: |
                  if [ -f changelog.md ]; then
                    content=$(tail -n +2 changelog.md | sed '/^$/d' | head -c 10000)
                    echo "content<<EOF" >> "$GITHUB_OUTPUT"
                    echo "$content"     >> "$GITHUB_OUTPUT"
                    echo "EOF"          >> "$GITHUB_OUTPUT"
                  else
                    echo "content=No changelog provided." >> "$GITHUB_OUTPUT"
                  fi

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.version.outputs.version }}
                  name: ${{ steps.version.outputs.version }}
                  body: ${{ steps.changelog.outputs.content }}
                  draft: false
                  prerelease: false
                  files: build/VynxUI.lua
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Send Discord notification
              if: ${{ env.DISCORD_WEBHOOK != '' }}
              env:
                  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
                  DISCORD_ROLE_ID: ${{ secrets.DISCORD_ROLE_ID }}
              run: |
                  VERSION="${{ steps.version.outputs.version }}"
                  URL="https://github.com/${{ github.repository }}/releases/tag/$VERSION"

                  CONTENT=""
                  if [ -f changelog.md ]; then
                    CONTENT=$(tail -n +2 changelog.md | head -c 1000)
                  fi
                  DESCRIPTION=$(echo "$CONTENT" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")

                  if [ -n "$DISCORD_ROLE_ID" ]; then
                    MENTION="\"<@&$DISCORD_ROLE_ID>\""
                  else
                    MENTION="null"
                  fi

                  curl -s -X POST "$DISCORD_WEBHOOK" \
                    -H "Content-Type: application/json" \
                    -d "{
                      \"content\": $MENTION,
                      \"embeds\": [{
                        \"title\": \"New release: $VERSION\",
                        \"description\": $DESCRIPTION,
                        \"color\": 8081663,
                        \"url\": \"$URL\",
                        \"author\": {
                          \"name\": \"${{ github.repository }}\",
                          \"url\": \"https://github.com/${{ github.repository }}\"
                        }
                      }]
                    }"
