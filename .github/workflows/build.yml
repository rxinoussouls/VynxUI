name: Build VynxUI (main)

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Setup Aftman
        uses: ok-nick/setup-aftman@v0.3.0
        continue-on-error: true

      - name: Install Aftman tools
        run: aftman install || true

      - name: Run build
        run: npm run build

      - name: Commit build/VynxUI.lua back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build/VynxUI.lua
          git commit -m "[AUTO] Upload built VynxUI.lua" || exit 0
          git push
